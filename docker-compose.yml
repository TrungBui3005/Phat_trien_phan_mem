version: '3.8'
services:
  webserver:
    image: php:8.1-apache
    container_name: student_club_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    depends_on:
      - database_server
    networks:
      - club_network

  database_server:
    image: mysql:8.0
    container_name: student_club_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "P@ssword123"
      MYSQL_DATABASE: "student_club"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - club_network

networks:
  club_network:
    driver: bridge

volumes:
  db_data: