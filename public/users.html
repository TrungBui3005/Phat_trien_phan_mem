<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Quyền Hạn | Admin</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: white; }
        .table thead th { background-color: #1a1d20; color: #fff; padding: 20px; border: none; font-weight: 600; }
        .table tbody td { padding: 20px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
        
        .role-badge { 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            letter-spacing: 0.5px;
            display: inline-block;
        }
        
        .form-select-sm { border-radius: 10px; font-size: 0.85rem; min-width: 140px; border: 1px solid #dee2e6; }
        .club-select { display: none; margin-top: 8px; border-color: #ffc107; }
        
        .btn-save { transition: all 0.2s; }
        .btn-save:hover { transform: scale(1.05); }
        
        /* Loading overlay */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); 
                     display: flex; justify-content: center; align-items: center; z-index: 9999; display: none; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner-border text-primary"></div></div>

    <div class="container py-5">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold text-dark mb-1">
                    <i class="fas fa-user-shield me-3 text-primary"></i>PHÂN QUYỀN HỆ THỐNG
                </h2>
                <p class="text-muted mb-0">Cấp quyền quản trị hoặc chỉ định Chủ nhiệm phụ trách từng CLB cụ thể.</p>
            </div>
            <a href="index.html" class="btn btn-white shadow-sm px-4 rounded-pill fw-bold border">
                <i class="fas fa-arrow-left me-2"></i>Quay lại
            </a>
        </div>
        
        <!-- Table Card -->
        <div class="card main-card overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4" width="10%">ID</th>
                            <th width="35%">Thành viên</th>
                            <th class="text-center" width="25%">Quyền hiện tại</th>
                            <th class="text-end pe-4" width="30%">Thiết lập quyền mới</th>
                        </tr>
                    </thead>
                    <tbody id="userList">
                        <tr>
                            <td colspan="4" class="text-center py-5 text-muted">
                                <div class="spinner-border spinner-border-sm me-2"></div> Đang tải danh sách...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allClubs = [];
        const loading = document.getElementById('loading');

        // Kiểm tra quyền Admin (Bảo mật cơ bản ở Client)
        const currentUser = JSON.parse(localStorage.getItem('user'));
        if (!currentUser || currentUser.role.toLowerCase() !== 'admin') {
            alert("Bạn không có quyền truy cập trang này!");
            window.location.href = 'index.html';
        }

        // 1. Tải danh sách CLB
        async function fetchClubs() {
            try {
                const res = await fetch('index.php/club/list');
                if (!res.ok) throw new Error("Lỗi tải CLB");
                allClubs = await res.json();
            } catch (e) { 
                console.error("Lỗi:", e); 
                allClubs = [];
            }
        }

        // 2. Tải danh sách người dùng
        async function loadUsers() {
            loading.style.display = 'flex';
            await fetchClubs(); 
            
            try {
                const res = await fetch('index.php/user/list');
                if (!res.ok) throw new Error("Không thể kết nối đến máy chủ");
                
                const result = await res.json();
                
               if (result.status === "success") {
    const listHtml = result.data.map(u => {
        // 1. Tạo danh sách các <option> cho dropdown chọn CLB
        const clubOptions = allClubs.map(c => 
            `<option value="${c.id}" ${u.club_id == c.id ? 'selected' : ''}>${c.club_name}</option>`
        ).join('');

        // 2. Logic hiển thị Role và Tên CLB (Thay đổi 'Chưa gán' tại đây)
        let displayRole = u.role.toUpperCase();
        
        if (u.role === 'chunhiem') {
            // Nếu có club_name thì hiện tên, không thì hiện "ID: " hoặc "Chưa gán"
            const clubInfo = u.club_name ? u.club_name : (u.club_id ? `ID: ${u.club_id}` : 'Chưa gán');
            displayRole = `CHỦ NHIỆM <br><small class="fw-normal">[${clubInfo}]</small>`;
        }

        return `
        <tr>
            <td class="ps-4 text-muted fw-bold">#${u.id}</td>
            <td>
                <div class="fw-bold text-dark">${u.full_name}</div>
                <div class="small text-muted">@${u.username}</div>
            </td>
            <td class="text-center">
                <span id="badge-role-${u.id}" class="role-badge ${getBadgeClass(u.role)} text-uppercase">
                    ${displayRole}
                </span>
            </td>
            <td class="text-end pe-4">
                <div class="d-flex flex-column align-items-end">
                    <div class="d-flex align-items-center">
                        <select class="form-select form-select-sm me-2" id="select-role-${u.id}" onchange="toggleClubSelect(${u.id})">
                            <option value="member" ${u.role === 'member' ? 'selected' : ''}>Member</option>
                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                            <option value="chunhiem" ${u.role === 'chunhiem' ? 'selected' : ''}>Chủ nhiệm</option>
                        </select>
                        <button onclick="updateRole(${u.id})" class="btn btn-sm btn-dark rounded-3 px-3 fw-bold">Lưu</button>
                    </div>
                    
                    <select class="form-select form-select-sm club-select" id="select-club-${u.id}" 
                            style="${u.role === 'chunhiem' ? 'display: block;' : ''}">
                        <option value="">-- Chọn CLB quản lý --</option>
                        ${clubOptions}
                    </select>
                </div>
            </td>
        </tr>`;
    }).join('');
    
    document.getElementById('userList').innerHTML = listHtml;
}
            } catch (e) { 
                document.getElementById('userList').innerHTML = `<tr><td colspan="4" class="text-center text-danger">Lỗi: ${e.message}</td></tr>`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function toggleClubSelect(userId) {
            const role = document.getElementById(`select-role-${userId}`).value;
            const clubSelect = document.getElementById(`select-club-${userId}`);
            clubSelect.style.display = (role === 'chunhiem') ? 'block' : 'none';
        }

        function getBadgeClass(role) {
            switch(role.toLowerCase()) {
                case 'admin': return 'bg-danger text-white';
                case 'chunhiem': return 'bg-warning text-dark border border-warning';
                default: return 'bg-primary text-white';
            }
        }

        async function updateRole(userId) {
            const newRole = document.getElementById(`select-role-${userId}`).value;
            const clubId = document.getElementById(`select-club-${userId}`).value;

            if (newRole === 'chunhiem' && !clubId) {
                alert("Vui lòng chọn Câu lạc bộ để giao quyền Chủ nhiệm!");
                return;
            }

            if (!confirm(`Bạn có chắc muốn đổi quyền của người dùng này sang ${newRole.toUpperCase()}?`)) return;

            loading.style.display = 'flex';
            try {
                const res = await fetch(`index.php/user/update-role`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id: userId, 
                        role: newRole,
                        club_id: (newRole === 'chunhiem') ? clubId : null 
                    })
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText || "Lỗi Server");
                }

                const result = await res.json();
                if (result.status === "success") {
                    alert("Cập nhật quyền hạn thành công!");
                    loadUsers(); 
                } else {
                    alert("Thất bại: " + result.message);
                }
            } catch (e) { 
                console.error(e);
                alert("Lỗi kết nối: " + e.message); 
            } finally {
                loading.style.display = 'none';
            }
        }

        // Khởi tạo
        loadUsers();
    </script>
</body>
</html>
