<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo Sự Kiện | Hệ Thống CLB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Inter', sans-serif; }
        .card-custom { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-grad { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            border-radius: 20px 20px 0 0; 
            padding: 30px;
        }
        .form-label { font-weight: 600; color: #4a5568; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .btn-save { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; border-radius: 10px; padding: 15px; font-weight: 700; color: white;
            transition: transform 0.2s;
        }
        .btn-save:hover { transform: translateY(-2px); opacity: 0.9; color: white; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card card-custom">
                    <div class="header-grad text-white text-center">
                        <h3 class="mb-0 fw-bold"><i class="fas fa-calendar-plus me-2"></i>TẠO SỰ KIỆN MỚI</h3>
                    </div>
                    <div class="card-body p-4 p-lg-5">
                        <div class="row g-4">
                            <!-- Chọn Câu Lạc Bộ -->
                            <div class="col-12">
                                <label class="form-label small text-uppercase">Thuộc Câu Lạc Bộ (*)</label>
                                <select id="club_id" class="form-select">
                                    <option value="">-- Đang tải danh sách CLB --</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label small text-uppercase">Tiêu đề sự kiện (*)</label>
                                <input type="text" id="title" class="form-control" placeholder="Workshop Lập trình...">
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label small text-uppercase">Mô tả sự kiện (*)</label>
                                <textarea id="description" class="form-control" rows="3" placeholder="Nội dung chi tiết sự kiện..."></textarea>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small text-uppercase">Ngày diễn ra (*)</label>
                                <input type="datetime-local" id="event_date" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small text-uppercase">Địa điểm (*)</label>
                                <input type="text" id="location" class="form-control" placeholder="Phòng B2.01">
                            </div>

                            <div class="col-12 mt-5 d-flex gap-3">
                                <button onclick="saveEvent()" class="btn btn-save flex-grow-1 shadow-sm">LƯU SỰ KIỆN</button>
                                <a href="index.html" class="btn btn-light px-4 border rounded-3 d-flex align-items-center">Hủy</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
       // Khởi tạo trang và tải danh sách câu lạc bộ
        document.addEventListener('DOMContentLoaded', loadClubs);

        async function loadClubs() {
            const clubSelect = document.getElementById('club_id');
            try {
                const response = await fetch('index.php/club/list');
                const clubs = await response.json();

                if (clubs.length > 0) {
                    clubSelect.innerHTML = '<option value="">-- Vui Lòng Chọn câu Lạc Bộ --</option>' + 
                        clubs.map(c => `<option value="${c.id}">${c.club_name}</option>`).join('');
                } else {
                    clubSelect.innerHTML = '<option value="">Chưa có CLB nào</option>';
                }
            } catch (error) {
                clubSelect.innerHTML = '<option value="">Lỗi Không Tải Được Danh Sách CLB</option>';
            }
        }

        // Gửi dữ liệu tạo sự kiện lên API
        async function saveEvent() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { window.location.href = 'login.html'; return; }
            const club_id = document.getElementById('club_id').value;
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const event_date = document.getElementById('event_date').value;
            const location = document.getElementById('location').value.trim();

            // Kiểm tra đầu vào bao gồm cả club_id
            if (!club_id || !title || !event_date || !location) {
                alert("Vui lòng điền đủ các trường có dấu (*)");
                return;
            }
            try {
                const response = await fetch('index.php/event/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        club_id, 
                        title, 
                        description, 
                        event_date, 
                        location, 
                        created_by: user.id 
                    })
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("✅ " + result.message);
                    window.location.href = 'index.html';
                } else {
                    alert("❌ Thất bại: " + result.message);
                }
            } catch (error) {
                alert("⚠️ Lỗi kết nối Server.");
            }
        }
    </script>
</body>
</html>
