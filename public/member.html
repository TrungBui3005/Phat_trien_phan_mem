<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Thành viên CLB HAHA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .table thead { background-color: #f8f9fa; }
        .badge-id { font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark"><i class="fas fa-users me-2 text-primary"></i>Quản lý Thành viên Câu Lạc Bộ vippro nét căng</h3>
            <button class="btn btn-primary px-4 shadow-sm" onclick="showAddModal()">
                <i class="fas fa-plus me-2"></i>Thêm Thành viên Mới
            </button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Tìm theo tên hoặc mã SV..." onkeyup="loadMembers()">
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Mã SV</th>
                        <th>Họ tên</th>
                        <th>CLB</th>
                        <th>Ban/Bộ phận</th>
                        <th>Chức vụ</th>
                        <th>Ngày tham gia</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="memberModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold text-dark" id="modalTitle">Thành viên</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="memberForm">
                    <input type="hidden" id="memberId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mã sinh viên (*)</label>
                        <input type="text" class="form-control" id="student_code" placeholder="Nhập mã SV..." required>
                        <small class="text-muted">Hệ thống sẽ tự khớp tên nếu SV đã có tài khoản.</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ban / Bộ phận</label>
                        <select class="form-select" id="department">
                            <option value="Kỹ thuật">Kỹ thuật</option>
                            <option value="Truyền thông">Truyền thông</option>
                            <option value="Sự kiện">Sự kiện</option>
                            <option value="Hành chính">Hành chính</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Chức vụ</label>
                        <input type="text" class="form-control" id="position" placeholder="Ví dụ: Trưởng ban, Thành viên...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ngày tham gia (*)</label>
                        <input type="date" class="form-control" id="joined_date" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-primary px-4" onclick="saveMember()">Lưu thay đổi</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let memberModal;

    document.addEventListener('DOMContentLoaded', () => {
        const modalEl = document.getElementById('memberModal');
        if (modalEl) {
            memberModal = new bootstrap.Modal(modalEl);
        }
        loadMembers();
    });

    // 1. Tải danh sách thành viên theo phân quyền
    async function loadMembers() {
        const search = document.getElementById('searchInput').value;
        const tbody = document.getElementById('memberTableBody');
        
        // Lấy thông tin user từ localStorage để biết đang login tài khoản nào
        const user = JSON.parse(localStorage.getItem('user'));
        
        if (!user || !user.id) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-warning">Vui lòng đăng nhập để xem danh sách.</td></tr>';
            return;
        }

        try {
            // Gửi kèm user_id để Backend kiểm tra quyền CLB
            const res = await fetch(`./index.php/member/list?search=${encodeURIComponent(search)}&user_id=${user.id}`);
            
            if (!res.ok) throw new Error("Không thể kết nối API");
            
            const members = await res.json();
            
            if (!members || members.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">Không tìm thấy thành viên nào thuộc CLB của bạn.</td></tr>';
                return;
            }

            tbody.innerHTML = members.map(m => `
                <tr>
                    <td><span class="badge bg-light text-dark border badge-id">${m.student_code}</span></td>
                    <td><strong>${m.full_name || 'Thành viên chưa tạo tài khoản'}</strong></td>
                    <td><span class="text-muted">${m.club_name || ''}</span></td>
                    <td>${m.department}</td>
                    <td><span class="badge bg-info-subtle text-info border border-info-subtle">${m.position}</span></td>
                    <td>${m.joined_date}</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editMember(${m.id})" title="Sửa">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteMember(${m.id})" title="Xóa">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (error) {
            console.error("Lỗi:", error);
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">Lỗi kết nối server hoặc phân quyền.</td></tr>';
        }
    }

    // 2. Hiện Modal Thêm mới
    function showAddModal() {
        document.getElementById('memberForm').reset();
        document.getElementById('memberId').value = '';
        document.getElementById('modalTitle').innerText = 'Thêm Thành viên Mới';
        
        // Mặc định ngày gia nhập là hôm nay
        document.getElementById('joined_date').valueAsDate = new Date();
        memberModal.show();
    }

    // 3. Lấy thông tin 1 thành viên để sửa
    async function editMember(id) {
        try {
            const res = await fetch(`./index.php/member/get?id=${id}`);
            const m = await res.json();
            
            document.getElementById('memberId').value = m.id;
            document.getElementById('student_code').value = m.student_code;
            document.getElementById('department').value = m.department;
            document.getElementById('position').value = m.position;
            document.getElementById('joined_date').value = m.joined_date;
            
            document.getElementById('modalTitle').innerText = 'Chỉnh sửa Thành viên';
            memberModal.show();
        } catch (error) {
            alert("Lỗi khi lấy dữ liệu chi tiết");
        }
    }

    // 4. Lưu dữ liệu (Thêm hoặc Sửa)
    async function saveMember() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || !user.club_id) { 
            alert("Không xác định được câu lạc bộ của bạn. Vui lòng đăng nhập lại."); 
            return; 
        }

        const data = {
            id: document.getElementById('memberId').value,
            student_code: document.getElementById('student_code').value.trim(),
            department: document.getElementById('department').value,
            position: document.getElementById('position').value.trim(),
            joined_date: document.getElementById('joined_date').value,
            // Luôn gán club_id theo chủ nhiệm đang đăng nhập
            club_id: user.club_id 
        };

        if (!data.student_code || !data.joined_date) {
            alert("Vui lòng điền đủ Mã sinh viên và Ngày tham gia!");
            return;
        }

        try {
            const res = await fetch('./index.php/member/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await res.json();
            
            if(result.status === "success") {
                memberModal.hide();
                loadMembers();
            } else {
                alert("Lỗi: " + result.message);
            }
        } catch (error) {
            alert("Lỗi hệ thống khi lưu dữ liệu");
        }
    }

    // 5. Xóa thành viên
    async function deleteMember(id) {
        if (confirm('Bạn có chắc muốn xóa thành viên này khỏi danh sách CLB?')) {
            try {
                const res = await fetch(`./index.php/member/delete?id=${id}`);
                const result = await res.json();
                if(result.status === "success") {
                    loadMembers();
                } else {
                    alert("Không thể xóa thành viên.");
                }
            } catch (error) {
                alert("Lỗi kết nối khi xóa");
            }
        }
    }
</script>
</body>
</html>
