<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin tức CLB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .news-card {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .news-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .news-img {
            height: 210px;
            object-fit: cover;
        }
        .btn-action { font-size: 0.85rem; padding: 6px 14px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">
                <i class="fas fa-newspaper text-primary me-2"></i>Tin tức CLB
            </h2>
            
            <div class="d-flex gap-3">
                <button onclick="window.location.href='index.html'" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-1"></i> Trang chủ
                </button>
                <button id="btnAddNews" onclick="goToCreateForm()" class="btn btn-primary d-none">
                    <i class="fas fa-plus me-1"></i> Thêm tin mới
                </button>
            </div>
        </div>

        <div class="row" id="newsContainer">
            <!-- Danh sách tin tức sẽ load vào đây -->
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { 
            window.location.href = 'login.html'; 
        }

        const role = user.role ? user.role.toLowerCase() : 'member';
        const canManage = (role === 'admin' || role === 'chunhiem');

        // Hiển thị nút "Thêm tin" cho Admin và Chủ nhiệm
        if (canManage) {
            document.getElementById('btnAddNews').classList.remove('d-none');
        }

        async function loadNews() {
            try {
                const res = await fetch('index.php/tintuc/list');
                const data = await res.json();
                const newsList = Array.isArray(data) ? data : (data.data || []);

                const container = document.getElementById('newsContainer');

                if (newsList.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <p class="text-muted">Chưa có tin tức nào.</p>
                            ${canManage ? `<button onclick="goToCreateForm()" class="btn btn-primary">Đăng tin đầu tiên</button>` : ''}
                        </div>`;
                    return;
                }

                container.innerHTML = newsList.map(item => `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card news-card h-100">
                            <img src="${item.hinh_anh || 'https://picsum.photos/400/300'}" 
                                 class="news-img w-100" alt="${item.tieu_de}">
                            <div class="card-body d-flex flex-column">
                                <span class="badge bg-primary mb-2" style="width: fit-content;">
                                    ${item.club_name || 'CLB'}
                                </span>
                                <h5 class="card-title fw-bold line-clamp-2">${item.tieu_de}</h5>
                                <small class="text-muted mb-2">
                                    ${item.dia_diem ? '📍 ' + item.dia_diem + ' • ' : ''} 
                                    ${new Date(item.ngay_dang).toLocaleDateString('vi-VN')}
                                </small>
                                <p class="card-text text-muted flex-grow-1 line-clamp-3">
                                    ${item.noi_dung ? item.noi_dung.substring(0, 130) + '...' : ''}
                                </p>
                                
                                <div class="d-flex gap-2 mt-3">
                                    <button onclick="viewDetail(${item.id})" class="btn btn-outline-primary btn-action flex-grow-1">
                                        Xem chi tiết
                                    </button>
                                    ${canManage ? `
                                    <button onclick="editNews(${item.id})" class="btn btn-warning btn-action">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteNews(${item.id})" class="btn btn-danger btn-action">
                                        <i class="fas fa-trash"></i>
                                    </button>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
                document.getElementById('newsContainer').innerHTML = `
                    <div class="col-12 text-center py-5 text-danger">
                        Không thể tải danh sách tin tức.
                    </div>`;
            }
        }

        function goToCreateForm() {
            window.location.href = 'tintuc-create.html'; 
        }

        function viewDetail(id) {
            alert(`🔍 Đang xem chi tiết tin tức #${id}\n\n(Chức năng xem chi tiết sẽ được làm sau)`);
        }

        async function editNews(id) {
    window.location.href = `tintuc-create.html?id=${id}`;
}

        async function deleteNews(id) {
    if (!confirm("Bạn có chắc chắn muốn xóa tin tức này không?")) return;

    try {
        const res = await fetch(`index.php/tintuc/delete?id=${id}`, { method: 'POST' });
        const result = await res.json();

        if (result.status === "success") {
            alert("✅ Xóa tin tức thành công!");
            loadNews(); // reload danh sách
        } else {
            alert("❌ " + result.message);
        }
    } catch (err) {
        alert("Lỗi kết nối server");
    }
}
        // Load dữ liệu khi trang mở
        window.onload = loadNews;
    </script>
</body>
</html>
