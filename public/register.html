<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Gia nhập CLB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center;
            font-family: 'Inter', sans-serif;
        }
        .register-card { 
            border: none; 
            border-radius: 20px; 
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            background-color: #f1f3f5;
            border: 1px solid transparent;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: #3a7bd5;
            box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.2);
        }
        .btn-register {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card register-card p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-dark">TẠO TÀI KHOẢN</h3>
                            <p class="text-muted small">Trở thành một phần của chúng tôi</p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Họ và tên</label>
                            <input type="text" id="full_name" class="form-control" placeholder="Nguyễn Văn A">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Mã sinh viên</label>
                            <input type="text" id="student_code" class="form-control" placeholder="Ví dụ: SV001">
                            <small class="text-muted" style="font-size: 0.7rem;">Dùng để tự động cập nhật thông tin CLB nếu bạn đã là thành viên.</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tên đăng nhập</label>
                            <input type="text" id="username" class="form-control" placeholder="user123">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Mật khẩu</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••">
                        </div>
                        
                        <button onclick="handleRegister()" class="btn btn-primary btn-register w-100 shadow-sm text-white">ĐĂNG KÝ NGAY</button>
                        
                        <div class="text-center mt-3">
                            <a href="login.html" class="small fw-bold text-decoration-none"><i class="fas fa-arrow-left me-1"></i> Quay lại Đăng nhập</a>
                        </div>
                        
                        <div id="message" class="text-center mt-3 small fw-bold"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister() {
            const fullName = document.getElementById('full_name').value.trim();
            const studentCode = document.getElementById('student_code').value.trim();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const msg = document.getElementById('message');

            // Kiểm tra đầu vào
            if(!fullName || !studentCode || !user || !pass) {
                msg.className = "text-danger text-center mt-3 small fw-bold";
                msg.innerText = "Vui lòng điền đầy đủ các trường thông tin!";
                return;
            }

            try {
                const response = await fetch('./index.php/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        full_name: fullName,
                        student_code: studentCode, // Gửi thêm MSV lên Server
                        username: user, 
                        password: pass 
                    })
                });

                const result = await response.json();
                
                if (result.status === "success") {
                    msg.className = "text-success text-center mt-3 small fw-bold";
                    msg.innerHTML = "✅ Đăng ký thành công!<br>Đang chuyển hướng...";
                    // Đợi 1.5 giây rồi chuyển về trang đăng nhập
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    msg.className = "text-danger text-center mt-3 small fw-bold";
                    msg.innerText = "❌ " + (result.message || "Đăng ký thất bại!");
                }
            } catch (error) {
                msg.className = "text-danger text-center mt-3 small fw-bold";
                msg.innerText = "⚠️ Lỗi kết nối Server!";
            }
        }
    </script>
</body>
</html>
