<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Hệ thống CLB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            font-family: 'Inter', sans-serif;
        }
        .login-card { 
            border: none; 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e1e5ee;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
            border-color: #764ba2;
        }
        .btn-login {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <i class="fas fa-shield-halved fa-3x text-primary"></i>
                            </div>
                            <h3 class="fw-bold text-dark">CHÀO MỪNG</h3>
                            <p class="text-muted small">Vui lòng đăng nhập để tiếp tục</p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Tên đăng nhập</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" id="username" class="form-control border-start-0" placeholder="Username">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" id="password" class="form-control border-start-0" placeholder="••••••••">
                            </div>
                        </div>
                        
                        <button onclick="handleLogin()" class="btn btn-primary btn-login w-100 shadow-sm text-white">VÀO HỆ THỐNG</button>
                        
                        <div id="message" class="text-danger text-center mt-3 small fw-bold"></div>
                    </div>
                    <div class="text-center mt-2 pb-3">
                        <span class="small text-muted">Chưa có tài khoản?</span>
                        <a href="register.html" class="small fw-bold text-decoration-none text-primary">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('message');

            if(!user || !pass) {
                msg.innerText = "Vui lòng nhập đầy đủ thông tin!";
                return;
            }

            try {
                const response = await fetch('./index.php/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();
                if (result.status === "success") {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = 'index.html';
                } else {
                    msg.innerText = "❌ " + result.message;
                }
            } catch (error) {
                msg.innerText = "⚠️ Lỗi kết nối Server!";
            }
        }
    </script>
</body>
</html>
